<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>私たちの中華大迷宮</title>
  <style>
    :root{
      --bg:#fff8eb;
      --ink:#271b18;
      --line:#5b3a35;
      --pink:#f58aa2;
      --yellow:#f7d96f;
      --mint:#98d9b7;
      --orange:#f6aa5d;
      --red:#f36b6c;
      --blue:#8fd1df;
      --purple:#caa0de;
    }

    *{box-sizing:border-box}

    body{
      margin:0;
      min-height:100vh;
      display:grid;
      place-items:center;
      background:
        radial-gradient(circle at 12% 18%, rgba(245,138,162,.16), transparent 11%),
        radial-gradient(circle at 90% 22%, rgba(245,138,162,.13), transparent 13%),
        radial-gradient(circle at 10% 84%, rgba(245,138,162,.12), transparent 12%),
        radial-gradient(circle at 86% 86%, rgba(245,138,162,.12), transparent 14%),
        var(--bg);
      color:var(--ink);
      font-family:"Arial Rounded MT Bold","Hiragino Maru Gothic ProN","Yu Gothic","Noto Sans JP",system-ui,sans-serif;
    }

    .app{
      width:min(900px,96vw);
      margin:20px auto;
      padding:22px;
      text-align:center;
    }

    h1{
      margin:0 0 8px;
      font-size:clamp(34px,6vw,64px);
      line-height:1.08;
      letter-spacing:.04em;
      font-weight:900;
      color:#f07186;
      text-shadow:2px 2px 0 #fff,4px 4px 0 rgba(91,58,53,.13);
    }

    .lead{
      display:inline-block;
      margin:8px 0 20px;
      padding:10px 18px;
      border-radius:999px;
      background:#fff;
      border:3px solid rgba(91,58,53,.18);
      color:#6f4a44;
      font-weight:900;
      font-size:15px;
    }

    .wheelArea{
      width:min(660px,92vw);
      margin:0 auto;
      position:relative;
      display:grid;
      place-items:center;
    }

    .pointer{
      position:absolute;
      top:18px;
      left:50%;
      transform:translateX(-50%);
      z-index:5;
      width:0;
      height:0;
      border-left:22px solid transparent;
      border-right:22px solid transparent;
      border-top:48px solid #f4a0ae;
      filter:drop-shadow(0 3px 0 rgba(91,58,53,.55));
    }

    canvas{
      width:100%;
      aspect-ratio:1;
      display:block;
    }

    .spin{
      margin-top:14px;
      width:min(460px,88vw);
      border:4px solid var(--line);
      border-radius:999px;
      background:#f4899a;
      color:#fff;
      padding:17px 20px;
      font-size:clamp(20px,4vw,32px);
      font-weight:900;
      letter-spacing:.04em;
      cursor:pointer;
      box-shadow:0 8px 0 #5b3a35;
      transition:.12s transform,.12s box-shadow;
    }

    .spin:active{
      transform:translateY(6px);
      box-shadow:0 2px 0 #5b3a35;
    }

    .spin:disabled{
      opacity:.55;
      cursor:not-allowed;
    }

    .resultBox{
      width:min(540px,90vw);
      margin:18px auto 0;
      background:#fff;
      border:4px solid rgba(91,58,53,.55);
      border-radius:24px;
      overflow:hidden;
      box-shadow:0 8px 0 rgba(91,58,53,.12);
    }

    .resultLabel{
      display:inline-block;
      transform:translateY(-1px);
      padding:6px 26px;
      background:#f4899a;
      color:#fff;
      border:3px solid rgba(91,58,53,.55);
      border-top:0;
      border-radius:0 0 14px 14px;
      font-weight:900;
      letter-spacing:.12em;
    }

    #result{
      min-height:74px;
      display:grid;
      place-items:center;
      padding:10px 18px 24px;
      font-size:clamp(22px,4vw,34px);
      font-weight:900;
    }

    .buttons{
      width:min(420px,92vw);
      margin:18px auto 0;
      display:grid;
      grid-template-columns:1fr;
      gap:12px;
    }

    .buttons button{
      border:3px solid rgba(91,58,53,.45);
      border-radius:18px;
      padding:13px 10px;
      background:#f4899a;
      color:#fff;
      font-weight:900;
      cursor:pointer;
      min-height:58px;
    }

    .note{
      margin-top:14px;
      color:#8a625b;
      font-size:13px;
      font-weight:700;
    }

    body.shareMode .lead,
    body.shareMode .buttons,
    body.shareMode .spin,
    body.shareMode .note{
      display:none;
    }

    body.shareMode .app{
      min-height:100vh;
      display:grid;
      align-content:center;
    }

    body.shareMode h1{
      font-size:clamp(34px,7vw,72px);
      margin-bottom:28px;
    }

    body.shareMode .wheelArea{
      transform:scale(.86);
      margin-top:-10px;
      margin-bottom:-28px;
      opacity:.72;
    }

    body.shareMode .resultBox{
      margin-top:8px;
      border-width:5px;
      box-shadow:0 12px 0 rgba(91,58,53,.13);
    }

    body.shareMode #result{
      min-height:132px;
      font-size:clamp(26px,6vw,52px);
      line-height:1.35;
      color:#271b18;
    }

    .shareReveal{
      animation:popReveal .62s ease both;
    }

    .shareSmall{
      display:block;
      margin-bottom:8px;
      color:#8a625b;
      font-size:clamp(16px,3vw,22px);
      letter-spacing:.08em;
    }

    .shareMain{
      display:block;
      color:#f07186;
      text-shadow:2px 2px 0 #fff,4px 4px 0 rgba(91,58,53,.13);
    }

    @keyframes popReveal{
      0%{opacity:0;transform:translateY(12px) scale(.96)}
      100%{opacity:1;transform:translateY(0) scale(1)}
    }

    @media(max-width:720px){
      .app{padding:14px}
    }
  </style>
</head>
<body>
  <main class="app">
    <h1>私たちの中華大迷宮</h1>
    <div class="lead">神に任せましょう。</div>

    <section class="wheelArea">
      <div class="pointer"></div>
      <canvas id="wheel" width="1000" height="1000"></canvas>
    </section>

    <button id="spin" class="spin">ルーレットを回す！</button>

    <section class="resultBox">
      <div class="resultLabel">結果</div>
      <div id="result">まだ回していません</div>
    </section>

    <section class="buttons">
      <button id="shareResult">結果入りURLをコピー</button>
    </section>

    <div class="note">ルーレットを回したら、結果入りURLをシェアしてね！</div>
  </main>

  <script>
    const canvas = document.getElementById("wheel");
    const ctx = canvas.getContext("2d");
    const resultEl = document.getElementById("result");
    const spinBtn = document.getElementById("spin");
    const shareResultBtn = document.getElementById("shareResult");

    let items = [
      "胖鴨",
      "獅門酒楼",
      "南粤美食",
      "美人酒家"
    ];

    const colors = ["#f7d96f","#98d9b7","#f6aa5d","#f36b6c","#8fd1df","#caa0de"];
    let rotation = 0;
    let spinning = false;
    let lastResult = "";
    let lastIndex = null;

    function draw(){
      const size = canvas.width;
      const c = size / 2;
      const outer = 430;
      const inner = 170;

      ctx.clearRect(0,0,size,size);
      ctx.save();
      ctx.translate(c,c);

      drawScallop(455, 38);

      ctx.save();
      ctx.rotate(rotation);

      const arc = Math.PI * 2 / items.length;

      items.forEach((item, i) => {
        const start = -Math.PI / 2 + i * arc;
        const end = start + arc;

        ctx.beginPath();
        ctx.arc(0,0,outer,start,end);
        ctx.arc(0,0,inner,end,start,true);
        ctx.closePath();
        ctx.fillStyle = colors[i % colors.length];
        ctx.fill();
        ctx.strokeStyle = "rgba(255,255,255,.86)";
        ctx.lineWidth = 5;
        ctx.stroke();

        ctx.save();
        ctx.rotate(start + arc / 2);
        ctx.translate((outer + inner) / 2, 0);
        ctx.rotate(Math.PI / 2);
        ctx.fillStyle = "#111";
        ctx.textAlign = "center";
        ctx.textBaseline = "middle";
        ctx.font = `900 36px "Arial Rounded MT Bold","Hiragino Maru Gothic ProN","Yu Gothic",sans-serif`;
        wrapText(item, 0, 0, 190, 40);
        ctx.restore();
      });

      ctx.restore();

      ctx.beginPath();
      ctx.arc(0,0,inner - 2,0,Math.PI*2);
      ctx.fillStyle = "#fff4d9";
      ctx.fill();
      ctx.strokeStyle = "#5b3a35";
      ctx.lineWidth = 7;
      ctx.stroke();

      drawSpiral();

      ctx.restore();
    }

    function drawScallop(radius, bumps){
      ctx.save();
      ctx.beginPath();
      for(let i=0;i<=bumps*2;i++){
        const a = i / (bumps*2) * Math.PI * 2;
        const r = radius + (i % 2 === 0 ? 12 : -8);
        const x = Math.cos(a) * r;
        const y = Math.sin(a) * r;
        if(i === 0) ctx.moveTo(x,y);
        else ctx.lineTo(x,y);
      }
      ctx.closePath();
      ctx.fillStyle = "#fff1d2";
      ctx.fill();
      ctx.strokeStyle = "#5b3a35";
      ctx.lineWidth = 6;
      ctx.stroke();
      ctx.restore();
    }

    function drawSpiral(){
      ctx.save();
      ctx.strokeStyle = "#f4899a";
      ctx.lineWidth = 18;
      ctx.lineCap = "round";
      ctx.beginPath();
      for(let t=0;t<Math.PI*5.2;t+=0.08){
        const r = 6 + t * 10;
        const x = Math.cos(t) * r;
        const y = Math.sin(t) * r;
        if(t === 0) ctx.moveTo(x,y);
        else ctx.lineTo(x,y);
      }
      ctx.stroke();
      ctx.restore();
    }

    function wrapText(text, x, y, maxWidth, lineHeight){
      const chars = [...text];
      const lines = [];
      let line = "";

      for(const ch of chars){
        const test = line + ch;
        if(ctx.measureText(test).width > maxWidth && line){
          lines.push(line);
          line = ch;
        }else{
          line = test;
        }
      }
      lines.push(line);

      const startY = y - (lines.length - 1) * lineHeight / 2;
      lines.forEach((line, i) => ctx.fillText(line, x, startY + i * lineHeight));
    }

    function spin(){
      if(items.length < 2 || spinning) return;

      spinning = true;
      spinBtn.disabled = true;
      resultEl.textContent = "抽選中……";

      const chosen = Math.floor(Math.random() * items.length);
      const arc = Math.PI * 2 / items.length;

      const segmentCenter = -Math.PI / 2 + chosen * arc + arc / 2;
      const finalRotation = -Math.PI / 2 - segmentCenter;
      const fullTurns = Math.PI * 2 * (6 + Math.floor(Math.random() * 4));

      const startRot = rotation;
      const targetRot = finalRotation + fullTurns;
      const duration = 4200;
      const startTime = performance.now();

      function easeOutCubic(t){
        return 1 - Math.pow(1 - t, 3);
      }

      function animate(now){
        const p = Math.min(1, (now - startTime) / duration);
        rotation = startRot + (targetRot - startRot) * easeOutCubic(p);
        draw();

        if(p < 1){
          requestAnimationFrame(animate);
        }else{
          rotation = finalRotation;
          lastIndex = chosen;
          lastResult = items[chosen];
          resultEl.textContent = `決定：${lastResult}`;
          spinning = false;
          spinBtn.disabled = false;
          draw();
        }
      }

      requestAnimationFrame(animate);
    }

    function encodeItems(list){
      return list.map(encodeURIComponent).join("|");
    }

    function decodeSafe(v){
      try{return decodeURIComponent(v)}catch(e){return v}
    }

    function escapeHtml(str){
      return String(str)
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    async function copyText(text){
      try{
        await navigator.clipboard.writeText(text);
      }catch(e){
        const t = document.createElement("textarea");
        t.value = text;
        document.body.appendChild(t);
        t.select();
        document.execCommand("copy");
        t.remove();
      }
    }

    async function shareResult(){
      if(!lastResult){
        resultEl.textContent = "先にルーレットを回してね";
        return;
      }

      const params = new URLSearchParams();
      params.set("items", encodeItems(items));
      params.set("result", lastResult);
      params.set("share", "1");
      params.set("index", String(lastIndex));

      const url = `${location.origin}${location.pathname}?${params.toString()}`;
      await copyText(url);

      const old = shareResultBtn.textContent;
      shareResultBtn.textContent = "コピーしました！";
      setTimeout(() => shareResultBtn.textContent = old, 1200);
    }

    function loadFromUrl(){
      const params = new URLSearchParams(location.search);
      const itemsParam = params.get("items");
      const resultParam = params.get("result");
      const indexParam = params.get("index");

      if(itemsParam){
        items = itemsParam.split("|").map(decodeSafe).filter(Boolean);
      }

      if(resultParam){
        lastResult = resultParam;

        const isShareMode = params.get("share") === "1";
        if(isShareMode){
          document.body.classList.add("shareMode");
          resultEl.textContent = "……";
          setTimeout(() => {
            resultEl.innerHTML = `<span class="shareReveal"><span class="shareSmall">今宵の一皿は——</span><span class="shareMain">${escapeHtml(lastResult)}</span></span>`;
          }, 850);
        }else{
          resultEl.textContent = `決定：${lastResult}`;
        }

        const idxFromUrl = indexParam !== null ? Number(indexParam) : items.indexOf(lastResult);
        if(Number.isInteger(idxFromUrl) && idxFromUrl >= 0 && idxFromUrl < items.length){
          lastIndex = idxFromUrl;
          const arc = Math.PI * 2 / items.length;
          const segmentCenter = -Math.PI / 2 + lastIndex * arc + arc / 2;
          rotation = -Math.PI / 2 - segmentCenter;
        }
      }
    }

    spinBtn.addEventListener("click", spin);
    shareResultBtn.addEventListener("click", shareResult);

    loadFromUrl();
    draw();
  </script>
</body>
</html>
